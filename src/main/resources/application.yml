server:
  port: ${SERVER_PORT:8000}

spring:
  application:
    name: fusion-ia-api
  ai:
    model:
      image: ${FUSION_PROVIDER:stub}
      chat: none
      embedding: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${OPENAI_API_KEY:}
      image:
        options:
          model: ${OPENAI_IMAGE_MODEL:gpt-image-1}
          size: ${OPENAI_IMAGE_SIZE:1024x1024}

fusion:
  provider: ${FUSION_PROVIDER:stub}
  image-dir: ${FUSION_IMAGE_DIR:app/data/images}
  rate-limit-per-hour: ${FUSION_RATE_LIMIT_PER_HOUR:10}


